services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: localroot
      MYSQL_DATABASE: property_manager
    ports:
      # Host 3307 avoids conflict when another MySQL already uses 3306
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
